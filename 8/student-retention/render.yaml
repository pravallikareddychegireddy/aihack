services:
  - type: web
    name: student-retention-ai
    runtime: python
rootDir: .
    buildCommand: mkdir -p backend/static && cp -r frontend/* backend/static/ && pip install -r backend/requirements.txt
    startCommand: gunicorn app:app --timeout 120 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
